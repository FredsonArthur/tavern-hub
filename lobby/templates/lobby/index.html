<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TavernHub - Lobby</title>
    <style>
        body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; text-align: center; }
        .dice-container { margin-top: 50px; padding: 20px; border: 2px solid #444; display: inline-block; border-radius: 10px; background: #252525; }
        #result { font-size: 3rem; color: #ffcc00; margin: 20px; font-weight: bold; }
        button { background: #8b0000; color: white; border: none; padding: 15px 30px; font-size: 1.2rem; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        button:hover { background: #ff0000; transform: scale(1.05); }
    </style>
</head>
<body>
    <h1>🎲 TavernHub</h1>
    <p>Bem-vindo ao Lobby, aventureiro!</p>

    <div class="dice-container">
        <div id="result">?</div>
        <button onclick="rollD20()">Rolar D20</button>
    </div>

    <script>
        function rollD20() {
            const resultDiv = document.getElementById('result');
            // Animação simples
            resultDiv.innerText = "...";
            setTimeout(() => {
                const roll = Math.floor(Math.random() * 20) + 1;
                resultDiv.innerText = roll;
                if(roll === 20) resultDiv.style.color = "#00ff00"; // Crítico!
                else if(roll === 1) resultDiv.style.color = "#ff0000"; // Falha!
                else resultDiv.style.color = "#ffcc00";
            }, 300);
        }
    </script>
</body>
</html>
