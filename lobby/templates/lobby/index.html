<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TavernHub - Lobby</title>
    <style>
        body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; text-align: center; padding-bottom: 50px; }
        .dice-container { margin-top: 20px; padding: 20px; border: 2px solid #444; display: inline-block; border-radius: 10px; background: #252525; }
        #result { font-size: 3rem; color: #ffcc00; margin: 20px; font-weight: bold; min-height: 60px; }
        
        /* Grid de botões para múltiplos dados */
        .dice-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        button { background: #8b0000; color: white; border: none; padding: 10px; font-size: 1rem; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        button:hover { background: #ff0000; transform: scale(1.05); }

        /* Estilo para o campo de nome */
        .player-setup { margin-top: 30px; }
        #playerName { 
            padding: 10px; 
            border-radius: 5px; 
            border: 1px solid #444; 
            background: #222; 
            color: white; 
            width: 250px; 
            text-align: center; 
            font-size: 1rem;
        }

        /* Estilos do Log de Combate */
        .log-container {
            margin-top: 40px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            background: #222;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #444;
            text-align: left;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .log-container h3 { border-bottom: 1px solid #444; padding-bottom: 10px; margin-top: 0; color: #8b0000; }
        .log-lista { max-height: 300px; overflow-y: auto; }
        .log-entry { 
            border-bottom: 1px solid #333; 
            padding: 8px 0; 
            font-size: 0.95rem; 
            display: flex; 
            justify-content: space-between;
        }
        .log-entry:last-child { border-bottom: none; }
        .log-entry .time { color: #666; font-size: 0.8rem; }
        .log-entry span.player { color: #aaa; }
        .log-entry span.value { color: #ffcc00; font-weight: bold; margin-left: 5px; }
        .log-entry span.dice-type { color: #8b0000; font-size: 0.85rem; font-style: italic; }
    </style>
</head>
<body>
    <h1>🎲 TavernHub</h1>
    
    <div class="player-setup">
        <input type="text" id="playerName" placeholder="Nome do seu Personagem" maxlength="20">
    </div>

    <div class="dice-container">
        <div id="result">?</div>
        <div class="dice-grid">
            <button onclick="rollDice(4)">D4</button>
            <button onclick="rollDice(6)">D6</button>
            <button onclick="rollDice(8)">D8</button>
            <button onclick="rollDice(10)">D10</button>
            <button onclick="rollDice(12)">D12</button>
            <button onclick="rollDice(20)">D20</button>
            <button onclick="rollDice(100)">D100</button>
        </div>
    </div>

    <div class="log-container">
        <h3>📜 Log de Combate</h3>
        <div id="log-lista" class="log-lista"></div>
    </div>

    <script>
        function atualizarLog() {
            fetch('/listar-rolagens/')
                .then(response => response.json())
                .then(data => {
                    const lista = document.getElementById('log-lista');
                    lista.innerHTML = ''; 

                    data.rolagens.forEach(r => {
                        const entry = document.createElement('div');
                        entry.className = 'log-entry';
                        entry.innerHTML = `
                            <div>
                                <span class="player">${r.jogador}</span> rolou 
                                <span class="value">${r.resultado}</span>
                                <span class="dice-type">(${r.tipo_dado})</span>
                            </div>
                            <span class="time">${r.data}</span>
                        `;
                        lista.appendChild(entry);
                    });
                })
                .catch(error => console.error('Erro ao buscar log:', error));
        }

        function rollDice(faces) {
            const resultDiv = document.getElementById('result');
            const nomeInput = document.getElementById('playerName');
            const nomeValue = nomeInput.value.trim() || "Aventureiro";
            
            resultDiv.innerText = "...";
            
            setTimeout(() => {
                const roll = Math.floor(Math.random() * faces) + 1;
                resultDiv.innerText = roll;

                // Destaque visual para acertos críticos ou falhas (baseado no D20)
                if(faces === 20 && roll === 20) resultDiv.style.color = "#00ff00";
                else if(faces === 20 && roll === 1) resultDiv.style.color = "#ff0000";
                else resultDiv.style.color = "#ffcc00";

                fetch('/salvar-rolagem/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        "resultado": roll,
                        "jogador": nomeValue,
                        "tipo_dado": "D" + faces
                    })
                })
                .then(response => {
                    if (!response.ok) throw new Error('Falha na requisição');
                    return response.json();
                })
                .then(data => {
                    console.log('Sucesso:', data);
                    atualizarLog();
                })
                .catch(error => console.error('Erro no Fetch:', error));

            }, 300);
        }

        document.addEventListener('DOMContentLoaded', atualizarLog);
    </script>
</body>
</html>
